<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Lab AI & Ilg'or Geofizika</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f1f5f9; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .formula-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(129, 140, 248, 0.15); padding: 1rem; border-radius: 0.75rem; font-family: serif; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #818cf8; margin-top: -6px; }
        .tab-active { border-bottom: 4px solid #818cf8; color: #818cf8; }
        .cylinder-container { position: relative; width: 120px; height: 180px; border: 3px solid #64748b; border-top: none; border-radius: 0 0 40px 40px; overflow: hidden; }
        .water { position: absolute; bottom: 0; left: 0; width: 100%; background: #3b82f6aa; transition: height 0.3s; }
        .delta-table th, .delta-table td { padding: 0.5rem; border: 1px solid #334155; }
        .gemini-sparkle { background: linear-gradient(90deg, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="bg-gradient-to-r from-slate-900 to-indigo-950 rounded-2xl p-6 border border-indigo-500/30">
            <h1 class="text-3xl font-black text-white uppercase">Geo-Lab AI ✨</h1>
            <p class="text-indigo-400 text-xs uppercase">Sun'iy intellekt bilan geofizika</p>
        </header>

        <!-- Qisqartirilgan interfeys (to'liq versiyani oldingi javobdan oling) -->
        <div class="glass-panel p-6 text-center">
            <p class="text-green-400">✅ HTML to'g'ri ishlamoqda. Streamlit orqali ko'rsatildi.</p>
            <p class="text-slate-400 text-sm mt-4">To'liq panelni ishga tushirish uchun oldingi javobdagi to'liq <code>index.html</code> kodini nusxalang.</p>
        </div>
    </div>
</body>
</html>
